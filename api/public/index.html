<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعدي الشخصي</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--card:#273549;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--danger:#f87171;--success:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.av{width:38px;height:38px;border-radius:50%;background:#0c4a6e33;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px}
.hname{font-size:15px;font-weight:600}
.hstatus{font-size:11px;color:var(--success)}
.htags{display:flex;gap:5px;margin-right:auto}
.htag{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--muted)}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:8px;align-items:flex-end}
.row.me{flex-direction:row-reverse}
.ava{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bub{max-width:78%;padding:9px 13px;font-size:14px;line-height:1.6}
.ai-b{background:var(--card);border:1px solid var(--border);border-radius:14px 14px 14px 3px}
.me-b{background:#0c4a6e33;border:1px solid var(--accent);border-radius:14px 14px 3px 14px;color:var(--accent)}
.warn-b{background:#450a0a33;border:1px solid var(--danger);border-radius:12px;color:var(--danger);max-width:90%;padding:10px 14px}
.dot-row{display:flex;gap:4px;align-items:center;padding:3px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:b 1s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chips{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;border-top:1px solid var(--border);background:var(--surface)}
.chip{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;background:var(--card);flex-shrink:0}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.inputrow{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface)}
.inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 13px;font-size:14px;color:var(--text);font-family:inherit;resize:none}
.inp:focus{outline:none;border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.sbtn{width:40px;height:40px;border-radius:12px;background:var(--accent);border:none;cursor:pointer;font-size:18px}
</style>
</head>
<body>
<div class="header">
  <div class="av">🤖</div>
  <div><div class="hname">مساعدي الشخصي</div><div class="hstatus">● متصل</div></div>
  <div class="htags"><span class="htag">🔒 أمن</span><span class="htag">🌐 شبكة</span><span class="htag">⚙️ إمبدد</span></div>
</div>
<div class="msgs" id="msgs">
  <div class="row">
    <div class="ava">🤖</div>
    <div class="bub ai-b">أهلاً! أنا مساعدك الشخصي 👋<br>عارف اهتماماتك — <strong>أمن سيبراني، شبكات، إمبدد</strong>.<br>سولفني أو اسألني!</div>
  </div>
</div>
<div class="chips">
  <div class="chip" onclick="ask('وش أهم نصايح الأمان اللي لازم أطبقها؟')">🔒 نصايح أمان</div>
  <div class="chip" onclick="ask('رتب لي أفكاري عن الشبكة والسيرفرات')">🌐 أفكار شبكة</div>
  <div class="chip" onclick="ask('عندي فكرة في إمبدد ساعدني أرتبها')">⚙️ فكرة إمبدد</div>
  <div class="chip" onclick="ask('وش أحسن طريقة تأمين سيرفر Linux؟')">🐧 تأمين Linux</div>
</div>
<div class="inputrow">
  <button class="sbtn" onclick="send()">➤</button>
  <textarea class="inp" id="inp" rows="1" placeholder="سولفني..."></textarea>
</div>
<script>
let history=JSON.parse(localStorage.getItem('h')||'[]');
history.forEach(m=>addBub(m.content,m.role==='user'?'me':'ai',false));
function addBub(text,who,scroll=true){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className='row'+(who==='me'?' me':'');
  const isWarn=who==='ai'&&text.includes('⚠️');
  row.innerHTML=`<div class="ava">${who==='me'?'👤':'🤖'}</div><div class="bub ${who==='me'?'me-b':isWarn?'warn-b':'ai-b'}">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(row);
  if(scroll)msgs.scrollTop=msgs.scrollHeight;
  return row;
}
function addTyping(){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className='row';
  row.innerHTML='<div class="ava">🤖</div><div class="bub ai-b"><div class="dot-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
  return row;
}
async function callAPI(text){
  history.push({role:'user',content:text});
  if(history.length>40)history=history.slice(-40);
  localStorage.setItem('h',JSON.stringify(history));
  const t=addTyping();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    const d=await r.json();
    const reply=d.reply||'ما وصل رد.';
    history.push({role:'assistant',content:reply});
    localStorage.setItem('h',JSON.stringify(history));
    t.querySelector('.bub').innerHTML=reply.replace(/\n/g,'<br>');
    document.getElementById('msgs').scrollTop=9999;
  }catch(e){t.querySelector('.bub').innerHTML='⚠️ ما قدرت أتصل.';}
}
function ask(q){document.getElementById('inp').value=q;send();}
function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  addBub(text,'me');
  callAPI(text);
}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
</script>
</body>
</html>
